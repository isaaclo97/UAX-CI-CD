# ============================================================
# KUBERNETES MANIFEST - CORREGIDO
# ============================================================

# CORREGIDO: Namespace dedicado, no usar 'default' (CKV_K8S_21)
apiVersion: v1
kind: Namespace
metadata:
  name: produccion

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-segura
  namespace: produccion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: segura-app
  template:
    metadata:
      labels:
        app: segura-app
    spec:
      hostNetwork: false
      hostPID: false

      serviceAccountName: app-sa

      # CORREGIDO: automountServiceAccountToken en false (CKV_K8S_38)
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        # CORREGIDO: UID >= 10000 para evitar conflictos con usuarios del host (CKV_K8S_40)
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: app
          image: myapp:1.4.2@sha256:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890

          securityContext:
            privileged: false
            runAsNonRoot: true
            runAsUser: 10000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # CORREGIDO: Sin env con secretKeyRef — los secretos se leen desde
          # los archivos montados en /etc/secrets (CKV_K8S_35).
          # La aplicación lee /etc/secrets/db-password y /etc/secrets/jwt-secret.

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          ports:
            - containerPort: 8080

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # CORREGIDO: Secretos montados como archivos en lugar de env vars (CKV_K8S_35)
            - name: secrets-vol
              mountPath: /etc/secrets
              readOnly: true

      volumes:
        - name: tmp
          emptyDir: {}
        - name: secrets-vol
          secret:
            secretName: app-secrets

---
# CORREGIDO: Namespace dedicado (CKV_K8S_21)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: produccion
# CORREGIDO: Token no montado automáticamente (CKV_K8S_38)
automountServiceAccountToken: false

---
# CORREGIDO: Role con permisos mínimos (CKV_K8S_21)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-role
  namespace: produccion
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-binding
  namespace: produccion
subjects:
  - kind: ServiceAccount
    name: app-sa
    namespace: produccion
roleRef:
  kind: Role
  name: app-role
  apiGroup: rbac.authorization.k8s.io

---
# CORREGIDO: NetworkPolicy para restringir tráfico del pod (CKV2_K8S_6)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-network-policy
  namespace: produccion
spec:
  podSelector:
    matchLabels:
      app: segura-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: produccion
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
