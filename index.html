<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupón Secreto UAX</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f0f1a;
            color: #e0e0e0;
        }

        .card {
            background: #1a1a2e;
            border: 1px solid #e94560;
            border-radius: 16px;
            padding: 2.5rem 3rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.15);
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #e94560; }
        p.subtitle { color: #888; margin-bottom: 1.8rem; font-size: 0.95rem; }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f0f1a;
            color: #e0e0e0;
            font-size: 1rem;
            letter-spacing: 1px;
            outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: #e94560; }

        button {
            margin-top: 1rem;
            width: 100%;
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #c73652; }

        #resultado {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            min-height: 2.5rem;
            display: none;
        }
        #resultado.ok {
            background: rgba(0, 200, 100, 0.1);
            border: 1px solid #00c864;
            color: #00c864;
        }
        #resultado.ko {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid #e94560;
            color: #e94560;
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.78rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎟️ Cupón Secreto</h1>
        <p class="subtitle">Introduce el cupón exclusivo de UAX para validarlo</p>

        <input type="text" id="inputCupon" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" />
        <button onclick="verificar()">Validar Cupón</button>

        <div id="resultado"></div>

        <p class="hint">¿No tienes el cupón? Quizás está más cerca de lo que crees... 👀</p>
    </div>

    <script>
        // TODO: esto no debería estar aquí — mover a variable de entorno
        const _secret = "Q1VQT04tU0VDUkVUTy1VQVgtMjAyNg=="; // base64

        function verificar() {
            const input = document.getElementById("inputCupon").value.trim().toUpperCase();
            const correcto = atob(_secret);
            const res = document.getElementById("resultado");

            res.style.display = "block";

            if (input === correcto) {
                res.className = "ok";
                res.textContent = "✅ ¡Cupón válido! Disfruta tu descuento exclusivo.";
            } else {
                res.className = "ko";
                res.textContent = "❌ Cupón incorrecto. Inténtalo de nuevo.";
            }
        }

        document.getElementById("inputCupon").addEventListener("keydown", function(e) {
            if (e.key === "Enter") verificar();
        });
    </script>
</body>
</html>
